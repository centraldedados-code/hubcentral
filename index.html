<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central de Dados | Instituto BR Arte</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;600;700&display=swap');
/*
  Identidade INSTITUCIONAL da Central — proposta como padrão provisório
  porque a Central lista projetos de vários financiadores e paletas
  diferentes (Portas Abertas/Prospera Rio, Prospera Turismo, CRIA HUB
  etc.), então deliberadamente não usa a paleta de nenhum projeto
  específico. Inspirada nas cores do logotipo "Instituto BR" (azul
  petróleo + tons quentes). Troque as 3 variáveis abaixo a qualquer
  momento se o Instituto BR Arte definir uma identidade visual própria
  para este painel — nenhum outro trecho do arquivo precisa mudar.
*/
:root{
  --pri:#14213D;--sec:#2A9D8F;--acc:#E9724C;
  --cz:#F5F5F7;--br:#FFFFFF;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Open Sans',Arial,sans-serif;background:var(--cz);color:var(--pri);min-height:100vh}
h1,h2,h3{font-family:'Montserrat',Arial,sans-serif}

.hdr{background:var(--pri);padding:28px 24px}
.hdri{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:14px}
.hlogo{height:44px;object-fit:contain;filter:brightness(0) invert(1)}
.htit{color:#fff;font-size:20px;font-weight:700}
.hsub{color:rgba(255,255,255,.6);font-size:12px;margin-top:2px}

.wrap{max-width:1100px;margin:0 auto;padding:28px 16px}

.st{font-size:11px;font-weight:700;color:var(--pri);text-transform:uppercase;letter-spacing:1.5px;margin:22px 0 14px;padding-left:10px;border-left:4px solid var(--sec)}

.gproj{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:800px){.gproj{grid-template-columns:repeat(2,1fr)}}
@media(max-width:520px){.gproj{grid-template-columns:1fr}}
.pcard{background:var(--br);border-radius:14px;padding:22px;cursor:pointer;transition:.18s;border:1.5px solid #e3e3ec;display:flex;flex-direction:column;gap:6px}
.pcard:hover{transform:translateY(-3px);box-shadow:0 8px 22px rgba(0,0,0,.08);border-color:var(--sec)}
.pnome{font-size:16px;font-weight:700;color:var(--pri)}
.psub2{font-size:12px;color:#888}
.pseta{margin-top:14px;font-size:11px;font-weight:700;color:var(--sec);text-transform:uppercase;letter-spacing:.5px}

.foot{margin-top:36px;padding:18px 0;border-top:1px solid #e3e3ec;font-size:11px;color:#999;text-align:center}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdri">
    <img class="hlogo" id="logoInst" src="" alt="" onerror="this.style.display='none'">
    <div>
      <div class="htit">Central de Dados</div>
      <div class="hsub">Instituto BR Arte — Monitoramento de todos os projetos</div>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="st">Projetos Ativos</div>
  <div class="gproj" id="gridProjetos"></div>

  <div class="foot">Instituto BR Arte — Central de Dados</div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────
// REGISTRO DE PROJETOS — para adicionar um novo projeto à Central,
// basta adicionar um novo objeto neste array com nome, subtítulo e a
// URL da página (GitHub Pages) daquele projeto. Nenhum outro trecho
// do arquivo precisa ser alterado.
//
// Esta versão da Central é só navegação (clique para abrir o painel
// de cada projeto) — sem tentar buscar score ao vivo via Web App, de
// propósito, para não depender de ter a URL do Web App de cada um dos
// 17 projetos em mãos. O score de cada projeto mora no painel dele.
// ─────────────────────────────────────────────────────────────────
var REGISTRO_PROJETOS = [
  {
    nome: 'Portas Abertas',
    subtitulo: 'Qualificação profissional — 9 polos, 63 turmas',
    paginaUrl: 'index_portas_abertas.html'
  },
  {
    nome: 'Prospera Turismo',
    subtitulo: 'Rotas turísticas em territórios (PTUR)',
    paginaUrl: 'https://centraldedados-code.github.io/pturmonitoramento/'
  },
  {
    nome: 'Prospera Rio',
    subtitulo: '',
    paginaUrl: 'https://redeprosperariodejaneiro-lgtm.github.io/prosperarioportal/'
  },
  {
    nome: 'CRIA HUB',
    subtitulo: '',
    paginaUrl: 'https://centraldedados-code.github.io/criahubrjmonitoramento/'
  }
];

function renderCard(proj) {
  return '<div class="pcard" onclick="abrirProjeto(\'' + proj.paginaUrl + '\')">' +
    '<div class="pnome">' + proj.nome + '</div>' +
    (proj.subtitulo ? '<div class="psub2">' + proj.subtitulo + '</div>' : '') +
    '<div class="pseta">Abrir painel ›</div>' +
    '</div>';
}

function abrirProjeto(url) { window.location.href = url; }

function iniciar() {
  var html = '';
  REGISTRO_PROJETOS.forEach(function (p) { html += renderCard(p); });
  document.getElementById('gridProjetos').innerHTML = html;
}
iniciar();
</script>
</body>
</html>
